<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nightwire — Metrics Grid Component</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --void: #000000; --void-warm: #0a0a0a;
  --nw-primary: #6699ff; --nw-primary-dim: #4477cc;
  --nw-green: #7aed7a;
  --nw-text-dim: #aaaaaa; --nw-text-faint: rgba(255,255,255,0.06);
  --font-title: 'Noto Serif Display', serif;
  --font-sys: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--void); font-family: var(--font-sys); font-size: 14px; line-height: 1.5; padding: 40px; }

.panel {
  background: var(--void-warm); border: 1px solid var(--nw-text-faint);
  width: 460px; margin: 0 auto;
}
.panel-header {
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--nw-primary);
  padding: 8px 12px 7px; border-bottom: 1px solid var(--nw-primary-dim);
}

.metrics-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--nw-text-faint);
}
.metric-cell {
  background: var(--void-warm); padding: 12px 14px;
}
.metric-cell .m-label {
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--nw-primary); margin-bottom: 2px;
}
.metric-cell .m-value {
  font-size: 20px; font-weight: 700; color: var(--nw-green);
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 6px rgba(122,237,122,0.4), 0 0 12px rgba(122,237,122,0.15);
  line-height: 1.1;
}
.metric-cell .m-sub {
  font-size: 9px; color: var(--nw-text-dim); margin-top: 2px;
}
.metric-cell.highlight .m-value {
  color: var(--nw-primary);
  text-shadow: 0 0 6px rgba(102,153,255,0.4);
  font-size: 24px;
}
.metric-cell.zero .m-value {
  font-family: var(--font-title); font-weight: 900; font-size: 30px;
  transform: scaleX(0.85); transform-origin: left;
}
</style>
</head>
<body>

<div class="panel">
  <div class="panel-header">Protocol Metrics — プロトコル指標</div>
  <div class="metrics-grid">
    <div class="metric-cell">
      <div class="m-label">Total TVL</div>
      <div class="m-value">$232.0M</div>
      <div class="m-sub">across 2 vaults</div>
    </div>
    <div class="metric-cell">
      <div class="m-label">Yield Generated (24h)</div>
      <div class="m-value">$284,190</div>
      <div class="m-sub">accrued to collateral</div>
    </div>
    <div class="metric-cell">
      <div class="m-label">Active Positions</div>
      <div class="m-value">4,470</div>
      <div class="m-sub">NFT-based (ERC-8004)</div>
    </div>
    <div class="metric-cell">
      <div class="m-label">Harvests (24h)</div>
      <div class="m-value">847</div>
      <div class="m-sub">MYT strategy harvests</div>
    </div>
    <div class="metric-cell highlight">
      <div class="m-label">Transmuter Buffer</div>
      <div class="m-value">93.0%</div>
      <div class="m-sub">avg across assets</div>
    </div>
    <div class="metric-cell zero">
      <div class="m-label">Liquidations</div>
      <div class="m-value" style="color:var(--nw-green)">0 ∞</div>
      <div class="m-sub">by design — 設計上ゼロ</div>
    </div>
  </div>
</div>

</body>
</html>
