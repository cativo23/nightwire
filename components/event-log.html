<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightwire — Event Log Component</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --void: #000000;
  --void-warm: #0a0a0a;
  --nw-primary: #6699ff;
  --nw-primary-dim: #4477cc;
  --nw-green: #7aed7a;
  --nw-green-dim: #5cb85c;
  --nw-green-faint: rgba(122,237,122,0.06);
  --nw-green-fill: rgba(122,237,122,0.1);
  --nw-cyan: #66ddff;
  --nw-cyan-dim: #44aacc;
  --nw-red: #ff6688;
  --nw-yellow: #e8993a;
  --nw-purple: #b266e0;
  --nw-text: #ffffff;
  --nw-text-dim: #aaaaaa;
  --nw-text-faint: rgba(255,255,255,0.06);
  --nw-text-line: rgba(255,255,255,0.12);
  --font-sys: 'JetBrains Mono', 'Cascadia Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--void); font-family: var(--font-sys); font-size: 14px; line-height: 1.5; }

.event-log {
  background: var(--void-warm);
  border: 1px solid var(--nw-text-faint);
  display: flex;
  flex-direction: column;
  width: 480px;
  height: 600px;
  margin: 20px auto;
}

.event-log .el-header {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--nw-primary);
  padding: 8px 12px 7px;
  border-bottom: 1px solid var(--nw-primary-dim);
  display: flex;
  justify-content: space-between;
  flex-shrink: 0;
}

.event-log .el-header .el-count {
  font-size: 9px;
  color: var(--nw-green);
  font-weight: 500;
}

.event-log .el-body {
  flex: 1;
  overflow-y: auto;
  font-size: 11px;
  line-height: 1.5;
  padding: 2px 0;
  min-height: 0;
}

.event-log .el-body::-webkit-scrollbar { width: 3px; }
.event-log .el-body::-webkit-scrollbar-track { background: var(--void); }
.event-log .el-body::-webkit-scrollbar-thumb { background: var(--nw-text-faint); }

.ev {
  padding: 2px 12px;
  display: flex;
  gap: 8px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  border-left: 2px solid transparent;
}
.ev:hover { background: var(--nw-green-faint); }
.ev .ev-time { color: var(--nw-text-dim); min-width: 60px; }
.ev .ev-type { min-width: 70px; font-weight: 700; letter-spacing: 0.04em; }
.ev .ev-detail { color: var(--nw-text); flex: 1; overflow: hidden; text-overflow: ellipsis; }
.ev .ev-amount { color: var(--nw-green); min-width: 95px; text-align: right; }
.ev .ev-block { color: var(--nw-text-dim); font-size: 10px; min-width: 70px; text-align: right; }

.ev-type.deposit  { color: var(--nw-green); }
.ev-type.borrow   { color: var(--nw-cyan); }
.ev-type.harvest  { color: var(--nw-primary); }
.ev-type.repay    { color: var(--nw-green-dim); }
.ev-type.redeem   { color: var(--nw-yellow); }
.ev-type.mint     { color: var(--nw-purple); }

.ev.new-entry { border-left-color: var(--nw-green); animation: ev-flash 0.6s ease-out; }
@keyframes ev-flash { 0% { background: var(--nw-green-fill); } 100% { background: transparent; } }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; }
}
</style>
</head>
<body>

<div class="event-log">
  <div class="el-header">
    <span>Blockchain Event Log — ブロックチェーンイベント</span>
    <span class="el-count" id="eventCount">0 events</span>
  </div>
  <div class="el-body" id="logBody"></div>
</div>

<script>
const TYPES = [
  { type: 'DEPOSIT', cls: 'deposit', w: 30 },
  { type: 'BORROW', cls: 'borrow', w: 20 },
  { type: 'HARVEST', cls: 'harvest', w: 25 },
  { type: 'REPAY', cls: 'repay', w: 10 },
  { type: 'REDEEM', cls: 'redeem', w: 10 },
  { type: 'MINT', cls: 'mint', w: 5 },
];
const totalW = TYPES.reduce((s, e) => s + e.w, 0);
let blockNum = 19284721, evCount = 0;

function randAddr() {
  const h = '0123456789abcdef';
  let a = '0x';
  for (let i = 0; i < 40; i++) a += h[Math.floor(Math.random() * 16)];
  return a.slice(0, 6) + '…' + a.slice(-4);
}

function genEvent() {
  let r = Math.random() * totalW;
  let et = TYPES[0];
  for (const e of TYPES) { r -= e.w; if (r <= 0) { et = e; break; } }
  blockNum += Math.floor(Math.random() * 3) + 1;
  evCount++;
  const time = new Date().toTimeString().split(' ')[0];
  const amounts = ['142.5 ETH', '5,000 alUSD', '+0.847 ETH', '28.3 ETH', '1,200 alETH', '50,000 USDC'];
  return {
    time, type: et.type, cls: et.cls,
    detail: et.type === 'HARVEST' ? 'Morpho wETH yield' : randAddr(),
    amount: amounts[Math.floor(Math.random() * amounts.length)],
    block: blockNum,
  };
}

function render(ev, isNew) {
  const d = document.createElement('div');
  d.className = 'ev' + (isNew ? ' new-entry' : '');

  const timeSpan = document.createElement('span');
  timeSpan.className = 'ev-time';
  timeSpan.textContent = ev.time;

  const typeSpan = document.createElement('span');
  typeSpan.className = 'ev-type ' + ev.cls;
  typeSpan.textContent = ev.type;

  const detailSpan = document.createElement('span');
  detailSpan.className = 'ev-detail';
  detailSpan.textContent = ev.detail;

  const amountSpan = document.createElement('span');
  amountSpan.className = 'ev-amount';
  amountSpan.textContent = ev.amount;

  const blockSpan = document.createElement('span');
  blockSpan.className = 'ev-block';
  blockSpan.textContent = '#' + ev.block;

  d.appendChild(timeSpan);
  d.appendChild(typeSpan);
  d.appendChild(detailSpan);
  d.appendChild(amountSpan);
  d.appendChild(blockSpan);

  logBody.appendChild(d);
  if (isNew) setTimeout(() => d.classList.remove('new-entry'), 700);
  while (logBody.children.length > 200) logBody.removeChild(logBody.firstChild);
  logBody.scrollTop = logBody.scrollHeight;
  document.getElementById('eventCount').textContent = evCount + ' events';
}

const logBody = document.getElementById('logBody');
for (let i = 30; i >= 1; i--) render(genEvent(), false);
(function tick() {
  setTimeout(() => { render(genEvent(), true); tick(); }, 2000 + Math.random() * 5000);
})();
</script>
</body>
</html>
